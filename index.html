<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Boutique en Ligne</title>
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Feuille de style personnalisée -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2><i class="fas fa-shopping-cart"></i> Connexion à votre compte</h2>
        <form action="/login" method="post">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" placeholder="Adresse e-mail" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Mot de passe" required>
            </div>
            <button type="submit"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
        </form>
        <div class="links">
            <a href="/register"><i class="fas fa-user-plus"></i> Créer un compte</a> |
            <a href="/forgot-password"><i class="fas fa-key"></i> Mot de passe oublié ?</a>
        </div>
    </div>
    <!-- Script JavaScript -->
    <script src="script.js"></script>
</body>
</html>
